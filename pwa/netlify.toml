# CommutePool — Netlify deployment config for Angular PWA

[build]
  command = "npm install && npx ng build --configuration production"
  publish = "dist/pwa/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — required for Angular client-side routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
