# pwa/netlify.toml
# Netlify sets base=pwa in the UI, so this file is picked up.
# The Angular source lives at the REPO ROOT (angular.json, package.json are at root level).
# We go up one level to build from the actual Angular workspace.

[build]
  command = "cd .. && npm install --legacy-peer-deps && npx ng build --configuration production"
  publish = "../dist/pwa/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# API proxy
[[redirects]]
  from   = "/api/*"
  to     = "https://commutepool-api.onrender.com/api/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache"
