# CommutePool — Netlify deployment config
# The Angular PWA source is NOT in pwa/ — the actual app is the Next.js 'web' workspace
# Build from repo root using pnpm + turbo

[build]
  base    = "/"
  command = "pnpm install && pnpm --filter web build"
  publish = "web/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# SPA/Next.js fallback
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
