# NOTE: This file exists only because Netlify UI has base=pwa set.
# The actual app is Next.js in web/ — this config builds from repo root.

[build]
  base    = "/"
  command = "pnpm install && pnpm --filter @commutepool/web build"
  publish = "web/.next"

[build.environment]
  NODE_VERSION   = "20"
  PNPM_VERSION   = "9"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from   = "/api/*"
  to     = "https://commutepool-api.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
