# Netlify config — base is locked to pwa/ in the UI
# Build runs from repo root via absolute path, output lands in ../web/.next

[build]
  command = "cd /opt/build/repo && pnpm install && pnpm --filter @commutepool/web build"
  publish = "../web/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Only proxy /api/* to backend — let the Next.js plugin handle everything else
[[redirects]]
  from   = "/api/*"
  to     = "https://commutepool-api.onrender.com/api/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
