# CommutePool — Netlify deployment config

[build]
  command   = "pnpm --filter @commutepool/web build"
  publish   = "web/.next"

[build.environment]
  NODE_VERSION = "20"

# Required for Next.js SSR, image optimization, and routing on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Proxy /api/* → Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://commutepool-api.onrender.com/api/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
