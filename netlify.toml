# CommutePool — Netlify deployment config (Angular PWA)

[build]
  base    = "pwa"
  command = "npm install && npx ng build --configuration production"
  publish = "dist/pwa/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes served by Angular router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# API proxy → Render backend (avoids CORS entirely)
[[redirects]]
  from   = "/api/*"
  to     = "https://commutepool-api.onrender.com/api/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache"
