# CommutePool — Netlify deployment config (Next.js web app)

[build]
  command = "pnpm --filter @commutepool/web build"
  publish = "web/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# API proxy → Render backend (avoids CORS entirely)
[[redirects]]
  from   = "/api/*"
  to     = "https://commutepool-api.onrender.com/api/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=0, must-revalidate"
