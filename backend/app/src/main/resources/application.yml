spring:
  application:
    name: commutepool-backend
  profiles:
    active: ${APP_ENV:dev}
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never

logging:
  level:
    root: INFO
    com.commutepool: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:60}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:30}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
    length: 6
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
