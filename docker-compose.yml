version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cp}
      POSTGRES_DB: ${POSTGRES_DB:-commutepool}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cp}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-cp}:${POSTGRES_PASSWORD:-cp}@postgres:5432/${POSTGRES_DB:-commutepool}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      OTP_BYPASS_IN_TEST: ${OTP_BYPASS_IN_TEST:-false}
      PORT: 3000
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  pwa:
    build:
      context: .
      dockerfile: docker/Dockerfile.pwa
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '4200:80'

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '4201:80'

volumes:
  pgdata:
