services:
  - type: web
    name: commutepool-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: ASPNETCORE_URLS
        value: http://+:3000
