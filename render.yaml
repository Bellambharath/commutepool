# CommutePool — Render Blueprint
# Backend: ASP.NET Core 8 (.NET) via Docker
# DB: PostgreSQL (free) | Cache: Redis (free)

services:

  # ─── ASP.NET Core API (Docker) ───────────────────────────────────────────────
  - type: web
    name: commutepool-api
    runtime: image
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: commutepool-db
          property: connectionString
      - key: Redis__ConnectionString
        fromService:
          name: commutepool-redis
          type: redis
          property: connectionString
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: commutepool-api
      - key: Jwt__Audience
        value: commutepool-client
      # Add manually in Render dashboard after first deploy:
      # Twilio__AccountSid, Twilio__AuthToken, Twilio__FromNumber
      # Admin__SeedEmail, Admin__SeedPassword

  # ─── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: commutepool-redis
    plan: free
    region: singapore
    ipAllowList: []   # internal access only

# ─── PostgreSQL ──────────────────────────────────────────────────────────────
databases:
  - name: commutepool-db
    plan: free
    region: singapore
    databaseName: commutepool
    user: cp
